name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build dylib
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MasterPDFEditor.dylib
          path: MasterPDFEditor.dylib